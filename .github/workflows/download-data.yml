name: Download data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 16 * * *'  # This will run daily at 3 AM UTC

permissions:
  contents: write

jobs:
  download_data:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: List files
        run: |
          ls -ltran

      - name: Download_data-futures
        run: |
          docker run --rm \
          --mount type=bind,source=$(pwd)/user_data,target=/freqtrade/user_data/ \
          freqtradeorg/freqtrade:stable \
          download-data \
          --exchange hyperliquid \
          --trading-mode futures \
          --pairs=".*/USDC:USDC" \
          --timeframes 1m 3m 5m 15m 30m 1h 2h 4h 8h 12h 1d 3d 1w 1M \
          --days 18 \
          --new-pairs-days 18 \
          --config=/freqtrade/user_data/config.json 2>&1 | tee download_data_logs_futures.txt

      - name: Fix permissions before commit
        run: |
          sudo chown -R $(id -u):$(id -g) .

      - name: Commit report
        run: |
          git config --global user.name 'hippocritical'
          git config --global user.email 'hippocritical@users.noreply.github.com'
          git config --global http.postBuffer 524288000
          git config --global http.version HTTP/1.1

          mapfile -d '' FILES < <(git -c status.renames=false status --porcelain -z -uall | cut -z -c4-)
          TOTAL=${#FILES[@]}
          echo "Changed files: $TOTAL"
          if [ "$TOTAL" -eq 0 ]; then
            echo "Nothing to commit"
            exit 0
          fi

          BATCH=500
          N=1
          for ((i=0; i<TOTAL; i+=BATCH)); do
            git add -- "${FILES[@]:i:BATCH}"
            git commit -m "Data update hyperliquid (part $N)"
            ok=0
            for try in 1 2 3; do
              if git push; then ok=1; break; fi
              echo "Push failed (try $try), retrying..."
              sleep 15
            done
            [ "$ok" -eq 1 ] || exit 1
            N=$((N+1))
          done
